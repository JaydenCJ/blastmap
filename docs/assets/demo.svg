<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="Menlo, Consolas, monospace" font-size="14">
  <rect width="720" height="430" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="360" y="27" fill="#8b949e" text-anchor="middle" font-size="12">blastmap — which packages does this diff actually hit?</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> blastmap affected --range origin/main...HEAD</text>
    <text x="24" y="92"><tspan fill="#79c0ff">blastmap affected</tspan> — origin/main...HEAD, 2 files changed</text>
    <text x="24" y="112" fill="#8b949e">workspace: npm (5 packages)</text>
    <text x="24" y="146" fill="#d2a8ff">changed</text>
    <text x="24" y="168">  <tspan fill="#f778ba">@demo/utils</tspan>  packages/utils  1 file</text>
    <text x="24" y="200" fill="#d2a8ff">dependent</text>
    <text x="24" y="222">  <tspan fill="#7ee787">@demo/api</tspan>    apps/api        via @demo/api -&gt; @demo/utils</text>
    <text x="24" y="244">  <tspan fill="#7ee787">@demo/ui</tspan>     packages/ui     via @demo/ui -&gt; @demo/utils</text>
    <text x="24" y="266">  <tspan fill="#7ee787">@demo/web</tspan>    apps/web        via @demo/web -&gt; @demo/ui -&gt; @demo/utils</text>
    <text x="24" y="298" fill="#d2a8ff">unclaimed (1 file owned by no package)</text>
    <text x="24" y="320" fill="#8b949e">  NOTES.md</text>
    <text x="24" y="352"><tspan fill="#79c0ff">4 of 5</tspan> packages affected</text>
    <text x="24" y="390"><tspan fill="#7ee787">$</tspan> blastmap affected --format lines | xargs -r -n1 npm test -w</text>
    <text x="24" y="412" fill="#8b949e">  # test only the blast radius — skip the rest of the monorepo</text>
  </g>
</svg>
